      text-decoration: none;
      color: #333;
      transition: all 0.25s ease;
    }

    .card:hover {
      background: #e0e0e0;
      transform: translateY(-6px);
    }

    .card h3 {
      margin: 10px 0;
    }

    .card p {
      font-size: 14px;
